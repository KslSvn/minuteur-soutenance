<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Minuteur de soutenance</title>
<style>
  :root{
    --bg:#131719;
    --panel:#1b2124;
    --card:#191f22;
    --track:#262e32;
    --text:#f2f6f7;
    --muted:#7d8b90;
    --blueA:#22aadd;
    --blueB:#00bad9;
    --accent: linear-gradient(135deg, var(--blueA), var(--blueB));
    --danger:#ff5a5f;
    --ring:#00bad9;
  }
  [data-theme="light"]{
    --bg:#f3f6f7;
    --panel:#ffffff;
    --card:#ffffff;
    --track:#dde5e7;
    --text:#131719;
    --muted:#5f6d72;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
    transition:background .2s,color .2s;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--panel);
    padding:12px 18px;
    flex-shrink:0;
    border-bottom:1px solid var(--track);
  }
  .pageTitle{font-size:15px;font-weight:700;letter-spacing:.3px;}
  .pageTitle span{
    background:var(--accent);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .iconbtn{
    background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;
    padding:6px 10px;border-radius:8px;
  }
  .iconbtn:hover{background:var(--track);color:var(--text);}

  .topbarRight{display:flex;align-items:center;gap:16px;}
  .logo{display:flex;flex-direction:column;align-items:flex-end;line-height:1.15;gap:2px;user-select:none;}
  .logoMain{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-style:italic;
    font-size:19px;
    color:var(--text);
    position:relative;
  }
  .logoReg{
    font-size:7px;font-weight:400;font-style:normal;
    border:1px solid var(--muted);border-radius:50%;
    padding:1px 3px;margin-left:3px;vertical-align:super;color:var(--muted);
  }
  .logoSub{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-size:7.5px;font-weight:600;letter-spacing:2.5px;
    color:var(--muted);text-transform:uppercase;
    display:flex;align-items:center;gap:2px;
  }
  .oIcon{
    width:6px;height:6px;border-radius:50%;
    border:1px solid var(--muted);display:inline-block;
  }

  /* ---------- Info panel ---------- */
  .infoPanel{
    display:flex;flex-wrap:wrap;align-items:flex-end;gap:12px;
    background:var(--panel);padding:10px 18px;border-bottom:1px solid var(--track);flex-shrink:0;
  }
  .infoGrid{display:flex;flex-wrap:wrap;gap:10px;flex:1;min-width:0;}
  .infoField{display:flex;flex-direction:column;gap:4px;min-width:130px;flex:1;}
  .infoField label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .infoField input{
    padding:7px 9px;border-radius:8px;border:1px solid var(--track);
    background:var(--bg);color:var(--text);font-size:13px;width:100%;
  }
  .infoActions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .saveStatus{font-size:12px;color:var(--muted);white-space:nowrap;}

  /* ---------- Grid of 3 clocks ---------- */
  main{
    flex:1;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
    padding:16px;
    min-height:0;
    overflow:auto;
  }
  @media (max-width:900px){ main{grid-template-columns:1fr;} }

  .card{
    background:var(--card);
    border:1px solid var(--track);
    border-radius:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:14px 10px 18px;
    min-height:0;
    position:relative;
  }
  .card.running{border-color:var(--clockColor);box-shadow:0 0 0 1px var(--clockColor), 0 0 24px -6px var(--clockColor);}
  .card.done{border-color:var(--danger);box-shadow:0 0 0 1px var(--danger), 0 0 24px -6px var(--danger);}

  .cardHead{
    display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:6px;
  }
  .cardLabel{font-size:13px;font-weight:700;color:var(--text);line-height:1.2;}
  .cardLabel .icon{margin-right:4px;}
  .gearbtn{
    background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;
    padding:4px 6px;border-radius:6px;flex-shrink:0;
  }
  .gearbtn:hover{background:var(--track);color:var(--text);}

  /* ---------- Dial (manual/wedge style) ---------- */
  .dialWrap{
    position:relative;
    width:min(26vw, 40vh, 280px);
    height:min(26vw, 40vh, 280px);
    touch-action:none;
    margin:4px 0 2px;
    cursor:grab;
  }
  @media (max-width:900px){
    .dialWrap{width:min(56vw,42vh,280px);height:min(56vw,42vh,280px);}
  }
  .dialSvg{width:100%;height:100%;display:block;overflow:visible;}
  .trackCircle{fill:none;stroke:var(--track);stroke-width:1;}
  .wedge{fill:var(--ring);opacity:.9;transition:fill .2s linear;filter:drop-shadow(0 0 10px var(--ring));}
  .hub{fill:var(--ring);filter:drop-shadow(0 0 6px var(--ring));}
  .handle{fill:var(--ring);filter:drop-shadow(0 0 8px var(--ring));}
  .tickLine{stroke:var(--muted);stroke-width:.6;opacity:.45;}
  .tickLine.major{stroke-width:.9;opacity:.75;}
  .tickLabel{
    fill:var(--muted);
    font-size:6.2px;
    font-weight:600;
    text-anchor:middle;
    dominant-baseline:middle;
    font-family:inherit;
  }

  .timeBlock{display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:2px;}
  .digits{
    font-size:min(6vw,6vh,36px);
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:.5px;
  }
  .digits.blink{animation:blink 1s steps(1) infinite;color:var(--danger);}
  @keyframes blink{50%{opacity:.25;}}
  .subtitle{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;}

  /* ---------- Controls per card ---------- */
  .controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
  .ctrlbtn{
    border:none;border-radius:50%;width:36px;height:36px;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;background:var(--track);color:var(--text);
  }
  .ctrlbtn.play{width:48px;height:48px;background:var(--clockColor);color:#0b1113;font-size:17px;}
  .ctrlbtn.play.running{background:var(--danger);color:#fff;}

  /* ---------- Settings modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10;}
  .overlay.open{display:flex;}
  .modal{background:var(--panel);color:var(--text);border:1px solid var(--track);border-radius:16px;padding:22px 24px;width:min(90vw,360px);}
  .modal h2{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .timeInputs{display:flex;gap:8px;align-items:center;}
  .timeInputs input{
    width:70px;padding:8px;border-radius:8px;border:1px solid var(--track);
    background:var(--bg);color:var(--text);font-size:16px;text-align:center;font-variant-numeric:tabular-nums;
  }
  .rowToggle{display:flex;align-items:center;justify-content:space-between;font-size:14px;}
  .modal .note{font-size:12px;color:var(--muted);margin-top:-8px;margin-bottom:16px;}
  .modalBtns{display:flex;justify-content:flex-end;gap:8px;margin-top:6px;}
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:14px;cursor:pointer;}
  .btn.primary{background:var(--accent);color:#0b1113;font-weight:700;}
  .btn.primary:disabled{opacity:.35;cursor:not-allowed;}
  .btn.ghost{background:var(--track);color:var(--text);}
  input[type=checkbox]{width:18px;height:18px;}
</style>
</head>
<body data-theme="dark">

  <div class="topbar">
    <div class="pageTitle">⏱ Minuteur de <span>soutenance</span></div>
    <div class="topbarRight">
      <div class="logo">
        <span class="logoMain">homnéo<sup class="logoReg">ho</sup></span>
        <span class="logoSub">Business Sch<span class="oIcon"></span>ol</span>
      </div>
      <button class="iconbtn" id="btnFullscreen" title="Plein écran">⛶</button>
    </div>
  </div>

  <div class="infoPanel">
    <div class="infoGrid">
      <div class="infoField"><label>Site</label><input type="text" id="fSite" placeholder="Site"></div>
      <div class="infoField"><label>Classe</label><input type="text" id="fClasse" placeholder="Classe"></div>
      <div class="infoField"><label>Alternant (nom prénom)</label><input type="text" id="fAlternant" placeholder="Nom Prénom"></div>
      <div class="infoField"><label>Jury 1 (nom prénom)</label><input type="text" id="fJury1" placeholder="Nom Prénom"></div>
      <div class="infoField"><label>Jury 2 (nom prénom)</label><input type="text" id="fJury2" placeholder="Nom Prénom"></div>
      <div class="infoField"><label>Date</label><input type="date" id="fDate"></div>
    </div>
    <div class="infoActions">
      <button class="btn primary" id="btnSave" disabled>💾 Enregistrer</button>
      <span class="saveStatus" id="saveStatus"></span>
    </div>
  </div>

  <main id="main"></main>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">Réglages</h2>
      <div class="field">
        <label>Durée du chrono</label>
        <div class="timeInputs">
          <input type="number" id="inpMin" min="0" max="180" value="0"> <span>min</span>
          <input type="number" id="inpSec" min="0" max="59" value="0"> <span>sec</span>
        </div>
      </div>
      <p class="note">Cadran sur une échelle fixe de 60 minutes. On peut aussi régler la durée à la main en faisant glisser sur le cadran (chrono à l'arrêt).</p>
      <div class="field rowToggle">
        <label style="margin:0;">🔊 Alarme sonore en fin de compte à rebours</label>
        <input type="checkbox" id="chkSound" checked>
      </div>
      <div class="field rowToggle">
        <label style="margin:0;">☀️ Fond clair</label>
        <input type="checkbox" id="chkTheme">
      </div>
      <div class="modalBtns">
        <button class="btn ghost" id="btnCloseModal">Fermer</button>
        <button class="btn primary" id="btnApply">Appliquer</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "soutenance-timer-state-v3";
  const INFO_KEY = "soutenance-timer-info-v1";
  const SVGNS = "http://www.w3.org/2000/svg";
  const FORM_ENDPOINT = "https://formspree.io/f/xpqgoqyn";

  const CLOCKS = [
    {id:"presentation", label:"Présentation de l'alternant", icon:"🎤", color:"#22aadd"},
    {id:"questions",    label:"Questions / réponses avec le jury", icon:"💬", color:"#2ecc8f"},
    {id:"deliberation", label:"Délibération du jury", icon:"⚖️", color:"#f5a623"}
  ];

  // Dial geometry (viewBox 0 0 100 100, center 50,50)
  const R_WEDGE = 34;
  const R_TRACK = 48.5;
  const R_TICK_OUT = 46;
  const R_TICK_IN_MINOR = 41.5;
  const R_TICK_IN_MAJOR = 39.5;
  const R_LABEL = 36.5;
  const R_HANDLE = R_WEDGE;
  const MAX_SCALE = 60; // cadran fixe sur 60 minutes

  let state = {
    theme:"dark", sound:true, editingIndex:0,
    clocks: CLOCKS.map(()=>({durationSec:0, remainingSec:0, running:false, endAt:null, done:false}))
  };

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const saved = JSON.parse(raw);
      if(saved && saved.clocks && saved.clocks.length===3){
        state.theme = saved.theme || "dark";
        state.sound = saved.sound !== false;
        saved.clocks.forEach((c,i)=>{
          state.clocks[i].durationSec = c.durationSec||0;
          state.clocks[i].remainingSec = c.durationSec||0;
        });
      }
    }catch(e){}
  }
  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        theme:state.theme, sound:state.sound,
        clocks: state.clocks.map(c=>({durationSec:c.durationSec}))
      }));
    }catch(e){}
  }

  const mainEl = document.getElementById("main");
  const overlay = document.getElementById("overlay");
  const modalTitle = document.getElementById("modalTitle");
  const inpMin = document.getElementById("inpMin");
  const inpSec = document.getElementById("inpSec");
  const chkSound = document.getElementById("chkSound");
  const chkTheme = document.getElementById("chkTheme");

  const fSite = document.getElementById("fSite");
  const fClasse = document.getElementById("fClasse");
  const fAlternant = document.getElementById("fAlternant");
  const fJury1 = document.getElementById("fJury1");
  const fJury2 = document.getElementById("fJury2");
  const fDate = document.getElementById("fDate");
  const btnSave = document.getElementById("btnSave");
  const saveStatus = document.getElementById("saveStatus");

  function loadInfo(){
    try{
      const raw = localStorage.getItem(INFO_KEY);
      if(raw){
        const info = JSON.parse(raw);
        fSite.value = info.site || "";
        fClasse.value = info.classe || "";
        fAlternant.value = info.alternant || "";
        fJury1.value = info.jury1 || "";
        fJury2.value = info.jury2 || "";
        fDate.value = info.date || "";
      }
    }catch(e){}
    if(!fDate.value){
      fDate.value = new Date().toISOString().slice(0,10);
    }
  }
  function saveInfo(){
    try{
      localStorage.setItem(INFO_KEY, JSON.stringify({
        site:fSite.value, classe:fClasse.value, alternant:fAlternant.value,
        jury1:fJury1.value, jury2:fJury2.value, date:fDate.value
      }));
    }catch(e){}
  }

  function el(ns, tag, attrs){
    const e = document.createElementNS(ns, tag);
    if(attrs) for(const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  const views = [];
  CLOCKS.forEach((cfg, i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--clockColor", cfg.color);
    card.innerHTML = `
      <div class="cardHead">
        <div class="cardLabel"><span class="icon">${cfg.icon}</span>${cfg.label}</div>
        <button class="gearbtn" title="Réglages">⚙️</button>
      </div>
      <div class="dialWrap"></div>
      <div class="timeBlock">
        <div class="digits">00:00</div>
        <div class="subtitle">restantes</div>
      </div>
      <div class="controls">
        <button class="ctrlbtn reset" title="Réinitialiser">⟲</button>
        <button class="ctrlbtn play" title="Démarrer / Pause">▶</button>
      </div>`;
    mainEl.appendChild(card);

    const dialWrap = card.querySelector(".dialWrap");
    const svg = el(SVGNS, "svg", {class:"dialSvg", viewBox:"0 0 100 100"});
    const track = el(SVGNS, "circle", {class:"trackCircle", cx:50, cy:50, r:R_TRACK});
    const ticksGroup = el(SVGNS, "g", {class:"ticksGroup"});
    const wedge = el(SVGNS, "path", {class:"wedge"});
    const hub = el(SVGNS, "circle", {class:"hub", cx:50, cy:50, r:3});
    const handle = el(SVGNS, "circle", {class:"handle", cx:50, cy:50-R_HANDLE, r:4.4});
    svg.appendChild(track);
    svg.appendChild(wedge);
    svg.appendChild(ticksGroup);
    svg.appendChild(hub);
    svg.appendChild(handle);
    dialWrap.appendChild(svg);

    views.push({
      card, dialWrap, svg, ticksGroup, wedge, hub, handle,
      digits:card.querySelector(".digits"),
      playBtn:card.querySelector(".play"),
      resetBtn:card.querySelector(".reset"),
      gearBtn:card.querySelector(".gearbtn")
    });
  });

  function fmt(sec){
    sec = Math.max(0, Math.round(sec));
    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    const s = sec%60;
    if(h>0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }

  function polar(cx, cy, r, deg){
    const rad = (deg-90) * Math.PI/180;
    return {x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad)};
  }

  function buildTicks(idx){
    const v = views[idx];
    v.ticksGroup.innerHTML = "";
    const maxScale = MAX_SCALE;
    const minorEvery = 1;
    const majorEvery = 5;
    for(let m=0; m<maxScale; m+=minorEvery){
      const deg = (m/maxScale)*360;
      const isMajor = m % majorEvery === 0;
      const p1 = polar(50,50, R_TICK_OUT, deg);
      const p2 = polar(50,50, isMajor?R_TICK_IN_MAJOR:R_TICK_IN_MINOR, deg);
      const line = el(SVGNS, "line", {
        class: "tickLine" + (isMajor?" major":""),
        x1:p1.x.toFixed(2), y1:p1.y.toFixed(2), x2:p2.x.toFixed(2), y2:p2.y.toFixed(2)
      });
      v.ticksGroup.appendChild(line);
      if(isMajor){
        const lp = polar(50,50, R_LABEL, deg);
        const text = el(SVGNS, "text", {class:"tickLabel", x:lp.x.toFixed(2), y:lp.y.toFixed(2)});
        text.textContent = m===0 ? maxScale+"'" : String(m);
        v.ticksGroup.appendChild(text);
      }
    }
  }

  function wedgePath(deg){
    if(deg<=0) return "";
    const clamped = Math.min(deg, 359.99);
    const p2 = polar(50,50, R_WEDGE, clamped);
    const largeArc = clamped>180 ? 1 : 0;
    const top = polar(50,50, R_WEDGE, 0);
    return `M 50 50 L ${top.x.toFixed(2)} ${top.y.toFixed(2)} A ${R_WEDGE} ${R_WEDGE} 0 ${largeArc} 1 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)} Z`;
  }

  function renderClock(idx){
    const c = state.clocks[idx];
    const v = views[idx];

    const remainingMin = c.remainingSec/60;
    const deg = Math.max(0, Math.min(360, (remainingMin/MAX_SCALE)*360));

    v.wedge.setAttribute("d", wedgePath(deg));
    const hp = polar(50,50, R_HANDLE, deg<=0 ? 0.001 : deg);
    v.handle.setAttribute("cx", hp.x.toFixed(2));
    v.handle.setAttribute("cy", hp.y.toFixed(2));

    let color = CLOCKS[idx].color;
    if(c.durationSec>0){
      const frac = c.remainingSec / c.durationSec;
      if(frac<=0.15) color = "var(--danger)";
    }
    v.dialWrap.style.setProperty("--ring", color);
    v.wedge.style.fill = color;
    v.hub.style.fill = color;
    v.handle.style.fill = color;
    v.wedge.style.filter = `drop-shadow(0 0 10px ${color})`;
    v.hub.style.filter = `drop-shadow(0 0 6px ${color})`;
    v.handle.style.filter = `drop-shadow(0 0 8px ${color})`;

    v.digits.textContent = fmt(c.remainingSec);
    v.digits.classList.toggle("blink", c.done);

    v.card.classList.toggle("running", c.running);
    v.card.classList.toggle("done", c.done);
    v.playBtn.textContent = c.running ? "⏸" : "▶";
    v.playBtn.classList.toggle("running", c.running);
  }

  function renderAll(){ state.clocks.forEach((_,i)=>{ buildTicks(i); renderClock(i); }); }

  // ---- le bouton Enregistrer ne s'active qu'après le démarrage du 1er chrono ----
  function updateSaveAvailability(){
    const c0 = state.clocks[0];
    const eligible = c0.durationSec>0 && (c0.running || c0.done || c0.remainingSec < c0.durationSec);
    btnSave.disabled = !eligible;
  }

  // ---- start/pause helpers (used by buttons + auto-chaining) ----
  function startClock(idx){
    const c = state.clocks[idx];
    if(c.durationSec<=0) return;
    if(c.remainingSec<=0) c.remainingSec = c.durationSec;
    c.done = false;
    c.endAt = Date.now() + c.remainingSec*1000;
    c.running = true;
    renderClock(idx);
    updateSaveAvailability();
  }
  function pauseClock(idx){
    const c = state.clocks[idx];
    c.remainingSec = Math.max(0,(c.endAt-Date.now())/1000);
    c.running = false;
    renderClock(idx);
  }

  function tick(){
    let needRender = false;
    state.clocks.forEach((c, i)=>{
      if(c.running){
        const remaining = (c.endAt - Date.now())/1000;
        if(remaining<=0){
          c.remainingSec = 0; c.running = false;
          if(!c.done){
            c.done = true;
            playAlarm();
            const nextIdx = i+1;
            if(nextIdx < state.clocks.length && !state.clocks[nextIdx].done && !state.clocks[nextIdx].running){
              startClock(nextIdx); // enchaîne automatiquement sur l'horloge suivante
            }
            if(i === state.clocks.length-1){
              submitData(true); // les 3 horloges sont terminées : enregistrement automatique
            }
          }
        } else { c.remainingSec = remaining; }
        needRender = true;
      }
    });
    if(needRender) state.clocks.forEach((_,i)=>renderClock(i));
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  views.forEach((v, idx)=>{
    v.playBtn.addEventListener("click", ()=>{
      const c = state.clocks[idx];
      if(c.running){ pauseClock(idx); }
      else { startClock(idx); }
    });
    v.resetBtn.addEventListener("click", ()=>{
      const c = state.clocks[idx];
      c.running = false; c.done = false; c.remainingSec = c.durationSec;
      renderClock(idx);
    });
  });

  // ---- drag on dial to set duration manually (only when idle) ----
  views.forEach((v, idx)=>{
    let dragging = false;
    function angleToMinutes(clientX, clientY){
      const rect = v.dialWrap.getBoundingClientRect();
      const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
      let deg = Math.atan2(clientY-cy, clientX-cx)*180/Math.PI + 90;
      if(deg<0) deg+=360;
      let minutes = (deg/360)*MAX_SCALE;
      minutes = Math.round(minutes*2)/2;
      return Math.max(0.5, minutes);
    }
    function start(e){
      const c = state.clocks[idx];
      if(c.running) return;
      dragging = true;
      v.dialWrap.style.cursor = "grabbing";
      move(e);
    }
    function move(e){
      if(!dragging) return;
      const p = e.touches ? e.touches[0] : e;
      const minutes = angleToMinutes(p.clientX, p.clientY);
      const c = state.clocks[idx];
      c.durationSec = Math.round(minutes*60);
      c.remainingSec = c.durationSec;
      c.done = false;
      renderClock(idx);
    }
    function end(){
      if(dragging){ dragging=false; v.dialWrap.style.cursor="grab"; buildTicks(idx); saveState(); }
    }
    v.dialWrap.addEventListener("mousedown", start);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    v.dialWrap.addEventListener("touchstart", start, {passive:true});
    window.addEventListener("touchmove", move, {passive:true});
    window.addEventListener("touchend", end);
  });

  let audioCtx = null;
  function playAlarm(){
    if(!state.sound) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const beepAt = (t, freq)=>{
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.35, t+0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t+0.28);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t); osc.stop(t+0.3);
      };
      const now = audioCtx.currentTime;
      beepAt(now, 880); beepAt(now+0.4, 880); beepAt(now+0.8, 1046);
    }catch(e){}
  }

  views.forEach((v, idx)=>{
    v.gearBtn.addEventListener("click", ()=>{
      state.editingIndex = idx;
      const c = state.clocks[idx];
      modalTitle.textContent = `⚙️ Réglages — ${CLOCKS[idx].label}`;
      inpMin.value = Math.floor(c.durationSec/60);
      inpSec.value = c.durationSec%60;
      chkSound.checked = state.sound;
      chkTheme.checked = state.theme==="light";
      overlay.classList.add("open");
    });
  });
  document.getElementById("btnCloseModal").addEventListener("click", ()=> overlay.classList.remove("open"));
  overlay.addEventListener("click", (e)=>{ if(e.target===overlay) overlay.classList.remove("open"); });

  document.getElementById("btnApply").addEventListener("click", ()=>{
    const c = state.clocks[state.editingIndex];
    const min = Math.max(0, parseInt(inpMin.value||"0",10));
    const sec = Math.max(0, Math.min(59, parseInt(inpSec.value||"0",10)));
    if(!c.running){
      c.durationSec = min*60+sec;
      c.remainingSec = c.durationSec;
      c.done = false;
    }
    state.sound = chkSound.checked;
    state.theme = chkTheme.checked ? "light" : "dark";
    document.body.setAttribute("data-theme", state.theme);
    renderAll();
    saveState();
    overlay.classList.remove("open");
  });

  document.getElementById("btnFullscreen").addEventListener("click", ()=>{
    if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
  });

  // ---- enregistrement vers Formspree (données + chronos) ----
  let autoSubmitted = false;

  function buildPayload(){
    const payload = {
      site: fSite.value,
      classe: fClasse.value,
      "alternant (nom prénom)": fAlternant.value,
      "jury 1 (nom prénom)": fJury1.value,
      "jury 2 (nom prénom)": fJury2.value,
      date: fDate.value
    };
    CLOCKS.forEach((cfg,i)=>{
      const c = state.clocks[i];
      payload[`${cfg.label} — durée programmée`] = fmt(c.durationSec);
      payload[`${cfg.label} — temps utilisé`] = fmt(c.durationSec - c.remainingSec);
    });
    return payload;
  }

  async function submitData(auto){
    if(auto){
      if(autoSubmitted) return;
      autoSubmitted = true;
    }
    saveInfo();
    btnSave.disabled = true;
    saveStatus.textContent = auto ? "Enregistrement automatique…" : "Envoi en cours…";
    try{
      const res = await fetch(FORM_ENDPOINT, {
        method:"POST",
        headers:{"Content-Type":"application/json", "Accept":"application/json"},
        body: JSON.stringify(buildPayload())
      });
      saveStatus.textContent = res.ok
        ? (auto ? "✅ Les 3 horloges sont terminées — enregistré" : "✅ Enregistré")
        : "❌ Erreur d'envoi";
      if(!res.ok && auto) autoSubmitted = false; // permettre un nouvel essai (manuel) en cas d'échec
    }catch(e){
      saveStatus.textContent = "❌ Erreur réseau";
      if(auto) autoSubmitted = false;
    }
    updateSaveAvailability();
    setTimeout(()=>{ saveStatus.textContent = ""; }, 6000);
  }

  btnSave.addEventListener("click", ()=> submitData(false));

  loadState();
  loadInfo();
  document.body.setAttribute("data-theme", state.theme);
  renderAll();
  updateSaveAvailability();
})();
</script>
</body>
</html>
